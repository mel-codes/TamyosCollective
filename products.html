<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->

  <link rel="stylesheet" href="styles/components/navbar.css">

<body class="products-page">

  <header class="navbar">

      <!-- hamburger - only visible on mobile -->
      <button class="navbar-hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- nav links - hidden on mobile until hamburger is clicked -->
      <ul class="navbar-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li>
          <a href="https://www.instagram.com/tamyoscollective/" target="_blank" rel="noopener" aria-label="Instagram">
            <i class="fa-brands fa-instagram"></i>
          </a>
        </li>
        <li><a href="https://www.depop.com/tamyosvintage/?fbclid=PAZXh0bgNhZW0CMTEAc3J0YwZhcHBfaWQMMjU2MjgxMDQwNTU4AAGngRQ5J7t6STLu83sgBVXa2tQRFM_IwfLuphmHQiAvz2ZV9fgqBHl5YfQRXJ0_aem_0vLo8YJjkrq8V_r9in2cIw&utm_content=link_in_bio&utm_medium=social&utm_source=ig" target="_blank" rel="noopener">Depop ↗</a></li>
        <!-- admin login icon -->
        <li class="navbar-user-li">
          <a href="https://admin.tamyoscollective.com" aria-label="Admin login">
            <i class="fa-regular fa-user"></i>
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <!-- MAIN CONTENT -->

  <main class="page-top">
    <section class="landing-page">
      <div>
        <h1>PRODUCTS</h1>
      </div>
      <div>
        <p>Hand-picked vintage pieces, one of a kind.</p>
      </div>
      <video src="assets/videos/vid2.mp4" type="video/mp4" class="products-video" autoplay muted loop playsinline>
        Your browser does not support this video.
      </video>
    </section>
    <section class="products-section">
      <div class="container">
        <!-- products grid — JS fills this in -->
        <ul class="products-grid" id="products-grid">
          <!-- loading state -->
          <p class="loading">Loading products...</p>
        </ul>
      </div>
    </section>
  </main>

  <!-- BACK TO TOP -->
   
  <button class="back-to-top" id="back-to-top" aria-label="Back to top">
    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <!-- FOOTER -->

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="assets/images/img1.png" alt="Tamyos Collective" class="footer-logo" />
      </div>
      <div class="footer-social">
        <a href="https://instagram.com/tamyoscollective" target="_blank" rel="noopener" aria-label="Instagram">
          <i class="fa-brands fa-instagram"></i>

        <a href="https://depop.com/tamyos" target="_blank" rel="noopener" aria-label="Depop">
